name: CI/CD Pipeline with Security Scanning

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Django Tests
      env:
        USE_SQLITE: 'True'
      run: |
        python manage.py migrate
        python manage.py test
    
    - name: Check Django deployment readiness
      env:
        USE_SQLITE: 'True'
      run: |
        python manage.py check --deploy || true

  # Job 2: SAST - Static Application Security Testing
  sast-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install Bandit
      run: pip install bandit
    
    - name: Run Bandit Security Scan
      run: |
        bandit -r tasks/ securetask/ -f json -o bandit-report.json || true
        bandit -r tasks/ securetask/ -f txt
      continue-on-error: true
    
    - name: Upload Bandit Report
      uses: actions/upload-artifact@v3
      with:
        name: bandit-security-report
        path: bandit-report.json

  # Job 3: SCA - Software Composition Analysis
  dependency-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install Safety
      run: pip install safety
    
    - name: Run Safety Check
      run: |
        safety check --json --output safety-report.json || true
        safety check
      continue-on-error: true
    
    - name: Upload Safety Report
      uses: actions/upload-artifact@v3
      with:
        name: safety-dependency-report
        path: safety-report.json

  # Job 4: Secret Scanning
  secret-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for secret scanning
    
    - name: TruffleHog Secret Scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
      continue-on-error: true

  # Job 5: Docker Build and Scan
  docker-security:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker Image
      run: |
        docker build -t securetask:${{ github.sha }} .
        docker tag securetask:${{ github.sha }} securetask:latest
    
    - name: Install Trivy
      run: |
        sudo apt-get install wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy
    
    - name: Run Trivy Vulnerability Scan
      run: |
        trivy image --format json --output trivy-report.json securetask:latest || true
        trivy image securetask:latest
      continue-on-error: true
    
    - name: Upload Trivy Report
      uses: actions/upload-artifact@v3
      with:
        name: trivy-container-report
        path: trivy-report.json

  # Job 6: Security Summary
  security-summary:
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan, secret-scan, docker-security]
    if: always()
    
    steps:
    - name: Download all reports
      uses: actions/download-artifact@v3
    
    - name: Display Summary
      run: |
        echo "==================================="
        echo "Security Scan Summary"
        echo "==================================="
        echo ""
        echo "Build and Test: Completed"
        echo "SAST (Bandit): Check artifacts"
        echo "Dependency Scan (Safety): Check artifacts"
        echo "Secret Scan (TruffleHog): Check logs"
        echo "Container Scan (Trivy): Check artifacts"
        echo ""
        echo "Download artifacts to view detailed reports"